{% extends "pages/base.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-6 col-md-9">
            <div class="card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-0">
                    <div class="p-5">
                        <div class="text-center">
                            <h1 class="h4 text-gray-900 mb-2">Mot de passe oublié ?</h1>
                            <p class="mb-4">Entrez votre adresse e-mail ci-dessous et nous vous enverrons un lien pour réinitialiser votre mot de passe !</p>
                        </div>
                        <form method="post" class="user">
                            {% csrf_token %}
                            <div class="form-group">
                                {{ form.email }}
                            </div>
                            <button type="submit" class="btn btn-primary btn-user btn-block">Réinitialiser</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
